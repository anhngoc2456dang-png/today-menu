<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 요리 - 냉장고 파먹기 AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FFDEE9;
            --accent-pink: #FFB7CE;
            --warm-yellow: #FFF5C3;
            --soft-white: #FFFFFF;
            --text-color: #5D5D5D;
            --shadow: 0 10px 25px rgba(255, 183, 206, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nanum Gothic', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary-pink) 0%, var(--warm-yellow) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            color: var(--text-color);
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: var(--shadow);
            border: 4px solid var(--soft-white);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-family: 'Gaegu', cursive;
            font-size: 3rem;
            color: #FF80AB;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0px #fff;
        }

        header p {
            font-size: 0.9rem;
            color: #888;
        }

        /* 입력창 스타일 */
        .input-section {
            margin-bottom: 25px;
        }

        .label-text {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            font-size: 1.1rem;
            color: #FF70A6;
        }

        .input-wrapper {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border: 2px solid var(--primary-pink);
        }

        input[type="text"] {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1rem;
            padding: 5px;
        }

        /* 필터 스타일 */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .filter-chip {
            padding: 8px 18px;
            border-radius: 50px;
            background: white;
            border: 2px solid var(--primary-pink);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.9rem;
            user-select: none;
        }

        .filter-chip.active {
            background: #FF70A6;
            color: white;
            border-color: #FF70A6;
            transform: scale(1.05);
        }

        /* 버튼 애니메이션 */
        .btn-recommend {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, #FF80AB, #FFB7CE);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 128, 171, 0.4);
            transition: all 0.3s;
        }

        .btn-recommend:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 20px rgba(255, 128, 171, 0.6);
        }

        .btn-recommend:active {
            transform: scale(0.98);
        }

        /* 로딩 애니메이션 */
        #loading {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .loading-icon {
            font-size: 3rem;
            animation: bounce 1s infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 결과창 스타일 */
        #result-area {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: #FFF9FB;
            border-radius: 25px;
            border: 2px dashed #FFB7CE;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recipe-title {
            color: #FF4081;
            font-size: 1.5rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 800;
        }

        .recipe-content {
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .btn-save {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: 2px solid #FF80AB;
            background: transparent;
            color: #FF80AB;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save:hover {
            background: #FF80AB;
            color: white;
        }

        /* 즐겨찾기 목록 */
        .favorites-section {
            margin-top: 40px;
        }

        .favorites-title {
            font-family: 'Gaegu', cursive;
            font-size: 1.8rem;
            color: #FF70A6;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .fav-card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            font-size: 0.85rem;
            border-left: 5px solid var(--warm-yellow);
        }

        .fav-card .chef {
            font-weight: bold;
            color: #FF80AB;
            margin-bottom: 5px;
            display: block;
        }

        .fav-card .dish {
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }

        @media (max-width: 480px) {
            .fav-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>🍳 오늘의 요리</h1>
        <p>냉장고 속 재료로 만드는 마법 같은 레시피!</p>
    </header>

    <div class="input-section">
        <label class="label-text">🛒 어떤 재료가 있나요?</label>
        <div class="input-wrapper">
            <input type="text" id="ingredients" placeholder="계란, 양파, 스팸 (쉼표로 구분)">
        </div>
    </div>

    <label class="label-text">✨ 요리 스타일 선택</label>
    <div class="filter-section" id="filter-group">
        <div class="filter-chip" data-value="매콤한">🌶️ 매콤한</div>
        <div class="filter-chip" data-value="담백한">🥗 담백한</div>
        <div class="filter-chip" data-value="다이어트">🏃 다이어트</div>
        <div class="filter-chip" data-value="아이들 간식">👶 아이들 간식</div>
        <div class="filter-chip" data-value="초간단">⚡ 초간단</div>
    </div>

    <button class="btn-recommend" onclick="getRecipe()">AI 요리 추천받기 ✨</button>

    <div id="loading">
        <span class="loading-icon">🍳</span>
        <p style="margin-top:10px; font-weight:bold; color:#FF70A6;">AI가 냉장고를 탈탈 털어 요리를 생각하고 있어요...</p>
    </div>

    <div id="result-area">
        <div class="recipe-title" id="res-title">추천 요리명</div>
        <div class="recipe-content" id="res-content"></div>
        <button class="btn-save" onclick="saveRecipe()">⭐ 이 레시피 저장하기</button>
    </div>

    <div class="favorites-section">
        <h2 class="favorites-title">💖 최근 추천된 요리들</h2>
        <div class="fav-grid" id="fav-list">
            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // [설정 1] Firebase 설정값
    const firebaseConfig = {
        apiKey: "AIzaSyDndbxXhc7ZqWDorOcwvd2jXBGTmNM1tkY",
        authDomain: "today-menu-app.firebaseapp.com",
        projectId: "today-menu-app",
        storageBucket: "today-menu-app.firebasestorage.app",
        messagingSenderId: "308755326469",
        appId: "1:308755326469:web:9f7597ff83dab41dc75e6c",
        measurementId: "G-HSRHFNMFYC"
    };

    // [설정 2] Gemini API 키
    const GEMINI_API_KEY = "AIzaSyCjG25sOWXp8jXonoHXsLrdBuyzq61gdL0";

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const favCol = collection(db, "favorites");

    // 전역 변수 (현재 레시피 저장용)
    let currentRecipe = null;

    // 필터 선택 로직
    const chips = document.querySelectorAll('.filter-chip');
    chips.forEach(chip => {
        chip.addEventListener('click', () => {
            chips.forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
        });
    });

    // AI 레시피 가져오기 함수
    async function getRecipe() {
        const ingredients = document.getElementById('ingredients').value.trim();
        const activeFilter = document.querySelector('.filter-chip.active')?.dataset.value || "일반적인";
        
        if (!ingredients) {
            alert("재료를 입력해주세요! 🥕");
            return;
        }

        // [Nâng cấp tích hợp] Chống nhập từ khóa phá hoại / không phải đồ ăn
        const invalidKeywords = /스마트폰|노트북|컴퓨터|돌멩이|쓰레기|의자|책상|유리|벽돌|아이폰|갤럭시/i;
        if (invalidKeywords.test(ingredients)) {
            alert("올바른 식재료를 입력해주세요! 🥺 냉장고에 그런 건 없어요!");
            return;
        }

        // UI 제어
        document.getElementById('loading').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';

        // Gemini 1.5 용 정밀 시스템 지침을 포함한 프롬프트 구성
        const prompt = `너는 냉장고 속 남은 재료로 최고의 한국 요리를 제안하는 귀여운 요리사 AI야.
사용자의 냉장고 재료: [${ingredients}]. 요리 스타일: [${activeFilter}]. 

만약 입력된 단어 중에 도저히 먹을 수 없는 사물이나 부적절한 단어가 섞여 있다면 레시피를 만들지 말고 반드시 딱 한 줄로만 "ERROR: 올바른 식재료가 아닙니다." 라고 응답해줘.

먹을 수 있는 정상적인 재료라면, 반드시 아래 형식만 엄격하게 지켜서 응답해줘:
요리명: [요리이름]
추가 재료: [필요한 추가 재료들]
조리 순서:
1. ...
2. ...`;

        try {
            // [수정 핵심] 주소 엔드포인트를 최신 모델인 gemini-1.5-flash 로 변경
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            
            // API 응답 데이터 예외 처리 구문 강화
            if (!data.candidates || data.candidates.length === 0) {
                throw new Error("No candidates returned from Gemini API");
            }
            
            const recipeText = data.candidates[0].content.parts[0].text;
            
            // 만약 식재료 필터링에 걸렸을 경우
            if (recipeText.includes("ERROR")) {
                alert("올바른 식재료를 입력해주세요! 🥺 냉장고에 그런 건 없어요!");
                return;
            }
            
            // 결과 파싱 및 표시
            const titleMatch = recipeText.match(/요리명:\s*(.*)/);
            const title = titleMatch ? titleMatch[1] : "맛있는 추천 요리";
            
            document.getElementById('res-title').innerText = title;
            document.getElementById('res-content').innerText = recipeText.replace(/요리명:.*\n/, "");
            document.getElementById('result-area').style.display = 'block';
            
            currentRecipe = { title, content: recipeText };
        } catch (error) {
            console.error(error);
            alert("AI와 연결하는 데 실패했어요. API 키나 인터넷 연결을 확인해주세요!");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // 레시피 저장 함수
    async function saveRecipe() {
        if (!currentRecipe) return;
        
        const nickname = prompt("멋진 닉네임을 입력해주세요! (예: 요리왕 비룡)");
        if (!nickname) return;

        try {
            await addDoc(favCol, {
                nickname: nickname,
                title: currentRecipe.title,
                timestamp: serverTimestamp()
            });
            alert("즐겨찾기에 저장되었습니다! ✨");
        } catch (e) {
            console.error(e);
            alert("저장 중 오류가 발생했습니다.");
        }
    }

    // 실시간 즐겨찾기 목록 불러오기 (Firebase Realtime)
    const q = query(favCol, orderBy("timestamp", "desc"), limit(10));
    onSnapshot(q, (snapshot) => {
        const favList = document.getElementById('fav-list');
        favList.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'fav-card';
            card.innerHTML = `
                <span class="chef">👩‍🍳 ${data.nickname || '익명'} 님의 추천</span>
                <span class="dish">🍴 ${data.title}</span>
            `;
            favList.appendChild(card);
        });
    });

    // 윈도우 전역 객체에 바인딩하여 HTML onclick 이벤트와 연동 처리 (Scope 문제 해결)
    window.getRecipe = getRecipe;
    window.saveRecipe = saveRecipe;

</script>

</body>
</html>
